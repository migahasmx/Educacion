<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Talleres</title>
</head>
<body align="center">

<h2>Lista de Talleres</h2>

<table align="center" >
    <tr>
        
        <th>Nombre</th>
        <th>División</th>
    </tr>

    <tr th:each="taller : ${lista}"> <!-- Itera sobre la lista de talleres -->
        
        <td th:text="${taller.nombreTaller}"></td> <!-- Muestra el nombre del taller -->
        
        <td th:text="${taller.divisionTaller}"></td> <!-- Muestra la división del taller -->
        
    </tr>
    </table> 
    
    <br> 
    
    <form method="get" action="/"> 
        <button type="submit">Inicio</button> <!-- Botón para volver al inicio -->
    </form>

</body>
</html>
